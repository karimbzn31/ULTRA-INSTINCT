<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ultra Instinct — Paramètres</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/admin/assets/style.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="text-2xl">⚡</span>
        <span class="sidebar-title">Ultra Instinct</span>
      </div>
      <nav class="sidebar-nav">
        <a href="/admin/dashboard" class="nav-item"><span>📊</span> Tableau de bord</a>
        <a href="/admin/clients" class="nav-item"><span>👥</span> Clients</a>
        <a href="/admin/new-client" class="nav-item"><span>➕</span> Nouveau client</a>
        <a href="/admin/settings" class="nav-item active"><span>⚙️</span> Paramètres</a>
        <div class="nav-spacer"></div>
        <button onclick="logout()" class="nav-item text-red-400 hover:text-red-300"><span>🚪</span> Déconnexion</button>
      </nav>
    </aside>

    <main class="main-content">
      <header class="main-header">
        <button class="md:hidden text-white text-2xl mr-4" onclick="toggleSidebar()">☰</button>
        <h1 class="text-2xl font-bold text-white">⚙️ Paramètres admin</h1>
        <div class="ml-auto flex items-center gap-3">
          <span class="text-purple-300/70 text-sm" id="adminName"></span>
          <div class="w-8 h-8 rounded-full bg-purple-600 flex items-center justify-center text-white text-sm font-bold" id="adminAvatar">K</div>
        </div>
      </header>

      <div class="section-card mb-6">
        <h2 class="text-lg font-semibold text-white mb-4">🔐 Modifier mes identifiants de connexion</h2>

        <div class="space-y-4 max-w-md">
          <div>
            <label class="form-label">Nouvel email</label>
            <input type="email" id="newEmail" class="form-input" placeholder="ton@email.com" />
          </div>
          <div>
            <label class="form-label">Nouveau mot de passe</label>
            <input type="password" id="newPassword" class="form-input" placeholder="Minimum 8 caractères" minlength="8" />
          </div>
          <div>
            <label class="form-label">Confirmer le mot de passe</label>
            <input type="password" id="confirmPassword" class="form-input" placeholder="Retaper le mot de passe" />
          </div>

          <div id="errorMsg" class="text-red-400 text-sm hidden"></div>
          <div id="successMsg" class="text-green-400 text-sm hidden"></div>

          <button onclick="saveSettings()" id="saveBtn" class="btn-primary">💾 Enregistrer</button>
        </div>
      </div>

      <div class="section-card">
        <h2 class="text-lg font-semibold text-white mb-2">🔒 Sécurité</h2>
        <p class="text-purple-300/50 text-sm">
          ⚠️ Ces identifiants sont stockés dans la base de données (Supabase).
          Change-les régulièrement. Ne les partage avec personne.
        </p>
      </div>
    </main>
  </div>

  <script src="/admin/assets/app.js"></script>
  <script>
    async function saveSettings() {
      const email = document.getElementById('newEmail').value.trim();
      const password = document.getElementById('newPassword').value;
      const confirm = document.getElementById('confirmPassword').value;
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      const btn = document.getElementById('saveBtn');

      errorMsg.classList.add('hidden');
      successMsg.classList.add('hidden');

      if (!email) { errorMsg.textContent = 'Email requis.'; errorMsg.classList.remove('hidden'); return; }
      if (password.length < 6) { errorMsg.textContent = 'Mot de passe : minimum 6 caractères.'; errorMsg.classList.remove('hidden'); return; }
      if (password !== confirm) { errorMsg.textContent = 'Les mots de passe ne correspondent pas.'; errorMsg.classList.remove('hidden'); return; }

      btn.disabled = true;
      btn.textContent = '⏳ Sauvegarde...';

      try {
        const data = await api('/api/admin/settings', 'PUT', { email, password });
        successMsg.textContent = '✅ Identifiants mis à jour avec succès ! Utilise ton nouvel email/mot de passe à la prochaine connexion.';
        successMsg.classList.remove('hidden');
        document.getElementById('newEmail').value = '';
        document.getElementById('newPassword').value = '';
        document.getElementById('confirmPassword').value = '';
      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = '💾 Enregistrer';
      }
    }
  </script>
</body>
</html>
