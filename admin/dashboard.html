<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ultra Instinct — Tableau de bord</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/admin/assets/style.css" />
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <span class="text-2xl">⚡</span>
        <span class="sidebar-title">Ultra Instinct</span>
      </div>
      <nav class="sidebar-nav">
        <a href="/admin/dashboard" class="nav-item active">
          <span>📊</span> Tableau de bord
        </a>
        <a href="/admin/clients" class="nav-item">
          <span>👥</span> Clients
        </a>
        <a href="/admin/new-client" class="nav-item">
          <span>➕</span> Nouveau client
        </a>
        <a href="/admin/settings" class="nav-item">
          <span>⚙️</span> Paramètres
        </a>
        <a href="/admin/client" class="nav-item" id="navLastClient" style="display:none">
          <span>📋</span> Dernier client
        </a>
        <div class="nav-spacer"></div>
        <button onclick="logout()" class="nav-item text-red-400 hover:text-red-300">
          <span>🚪</span> Déconnexion
        </button>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="main-header">
        <button class="md:hidden text-white text-2xl mr-4" onclick="toggleSidebar()">☰</button>
        <h1 class="text-2xl font-bold text-white">Tableau de bord</h1>
        <div class="ml-auto flex items-center gap-3">
          <span class="text-purple-300/70 text-sm" id="adminName"></span>
          <div class="w-8 h-8 rounded-full bg-purple-600 flex items-center justify-center text-white text-sm font-bold" id="adminAvatar"></div>
        </div>
      </header>

      <!-- Stats Grid -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon bg-blue-500/10 text-blue-400">👥</div>
          <div>
            <div class="stat-value" id="statTotal">0</div>
            <div class="stat-label">Total clients</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon bg-green-500/10 text-green-400">🟢</div>
          <div>
            <div class="stat-value" id="statActive">0</div>
            <div class="stat-label">Actifs</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon bg-red-500/10 text-red-400">🔴</div>
          <div>
            <div class="stat-value" id="statInactive">0</div>
            <div class="stat-label">Inactifs</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon bg-purple-500/10 text-purple-400">💬</div>
          <div>
            <div class="stat-value" id="statMessages">0</div>
            <div class="stat-label">Messages traités</div>
          </div>
        </div>
      </div>

      <!-- Platform Stats -->
      <div class="section-card mt-6">
        <h2 class="text-lg font-semibold text-white mb-4">📱 Plateformes connectées</h2>
        <div class="platform-grid">
          <div class="platform-badge"><span>💬</span> Messenger <span class="platform-count" id="platMessenger">0</span></div>
          <div class="platform-badge"><span>📸</span> Instagram <span class="platform-count" id="platInstagram">0</span></div>
          <div class="platform-badge"><span>💚</span> WhatsApp <span class="platform-count" id="platWhatsapp">0</span></div>
          <div class="platform-badge"><span>✈️</span> Telegram <span class="platform-count" id="platTelegram">0</span></div>
        </div>
      </div>

      <!-- Recent Clients -->
      <div class="section-card mt-6">
        <h2 class="text-lg font-semibold text-white mb-4">🆕 Derniers clients</h2>
        <div id="recentClients" class="space-y-2">
          <div class="text-purple-300/50 text-sm">Chargement...</div>
        </div>
      </div>
    </main>
  </div>

  <script src="/admin/assets/app.js"></script>
  <script>
    async function loadDashboard() {
      try {
        const data = await api('/api/admin/stats');

        document.getElementById('statTotal').textContent = data.total;
        document.getElementById('statActive').textContent = data.active;
        document.getElementById('statInactive').textContent = data.inactive;
        document.getElementById('statMessages').textContent = data.totalMessages.toLocaleString();

        document.getElementById('platMessenger').textContent = data.platformStats.messenger;
        document.getElementById('platInstagram').textContent = data.platformStats.instagram;
        document.getElementById('platWhatsapp').textContent = data.platformStats.whatsapp;
        document.getElementById('platTelegram').textContent = data.platformStats.telegram;

        const recentDiv = document.getElementById('recentClients');
        if (data.recentClients.length === 0) {
          recentDiv.innerHTML = '<div class="text-purple-300/50 text-sm">Aucun client pour le moment.</div>';
          return;
        }

        recentDiv.innerHTML = data.recentClients.map(c => `
          <a href="/admin/client?id=${c.id}" class="flex items-center justify-between p-3 bg-white/5 rounded-xl hover:bg-white/10 transition cursor-pointer">
            <div>
              <div class="text-white font-medium">${c.name}</div>
              <div class="text-purple-300/50 text-sm">${c.company || '—'}</div>
            </div>
            <span class="status-dot ${c.active ? 'active' : 'inactive'}">${c.active ? 'Actif' : 'Inactif'}</span>
          </a>
        `).join('');
      } catch (err) {
        showError('Erreur chargement dashboard');
      }
    }

    loadDashboard();
  </script>
</body>
</html>
