<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ultra Instinct — Connexion</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/assets/style.css" />
</head>
<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <!-- Logo / Brand -->
    <div class="text-center mb-8">
      <div class="text-6xl mb-3">⚡</div>
      <h1 class="text-3xl font-bold text-white">Ultra Instinct</h1>
      <p class="text-purple-300/70 mt-1">Agent AI — Dashboard Admin</p>
    </div>

    <!-- Login Card -->
    <div class="bg-white/5 backdrop-blur-xl rounded-2xl p-8 border border-white/10 shadow-2xl">
      <h2 class="text-xl font-semibold text-white mb-6">Connexion</h2>

      <form id="loginForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-purple-200 mb-1">Email</label>
          <input type="email" id="email" value="admin@ultra-instinct.ai"
            class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-purple-300/40 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition"
            placeholder="admin@ultra-instinct.ai" required />
        </div>
        <div>
          <label class="block text-sm font-medium text-purple-200 mb-1">Mot de passe</label>
          <input type="password" id="password" value="admin123"
            class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-purple-300/40 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition"
            placeholder="••••••••" required />
        </div>

        <div id="errorMsg" class="text-red-400 text-sm hidden"></div>

        <button type="submit" id="loginBtn"
          class="w-full py-3 bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-500 hover:to-blue-500 text-white font-semibold rounded-xl transition-all duration-200 transform hover:scale-[1.02] active:scale-[0.98] shadow-lg shadow-purple-500/25">
          Se connecter
        </button>
      </form>
    </div>

    <p class="text-center text-purple-300/40 text-xs mt-6">Agent AI Ultra Instinct v1.0</p>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      const btn = document.getElementById('loginBtn');

      errorMsg.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = 'Connexion...';

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Erreur de connexion');
        }

        localStorage.setItem('ui_token', data.token);
        localStorage.setItem('ui_admin', JSON.stringify(data.admin));
        window.location.href = '/admin/dashboard';
      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Se connecter';
      }
    });
  </script>
</body>
</html>
